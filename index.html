<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/webp" href="/induslogo.webp" />
  <link rel="preload" as="image" type="image/webp" href="/induslogo.webp" fetchpriority="high" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>industrialist-calculator</title>
  <style>
    @keyframes startup-loading-spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .startup-spinner {
      width: 24px;
      height: 24px;
      animation: startup-loading-spin 1.2s linear infinite;
      display: inline-block;
      margin-right: 12px;
      vertical-align: middle;
      flex-shrink: 0;
    }
  </style>
</head>

<body style="margin: 0; padding: 0; overflow: hidden; background: #0a0a0a;">
  <div id="root">
    <div style="
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        height: 100vh; 
        width: 100vw; 
        background: #0a0a0a; 
        color: #999999; 
        font-family: monospace; 
        font-size: 11px; 
        letter-spacing: 0.1em;
      ">
      <div style="
          border: 1px solid #333333; 
          padding: 14px 20px; 
          background: #1a1a1a; 
          display: flex;
          align-items: center;
          box-sizing: border-box;
        ">
        <img src="/induslogo.webp" class="startup-spinner" alt="L" />
        <div>
            <div style="font-weight: bold; color: #f5d56a; margin-bottom: 2px; white-space: nowrap; line-height: 1.2;">INDUSTRIALIST SYSTEM</div>
            <div style="color: #22c55e; white-space: nowrap; line-height: 1.2;">Loading application data...</div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
